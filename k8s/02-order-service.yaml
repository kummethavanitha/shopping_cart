apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: vanitha2612/order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          env:
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service.catalog.svc.cluster.local:5001"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: order
spec:
  selector:
    app: order-service
  ports:
    - port: 5002
      targetPort: 5002
